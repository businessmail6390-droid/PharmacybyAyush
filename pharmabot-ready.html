<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#080c10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PharmaBot"/>
<title>PharmaBot by Ayush Ji</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#080c10;color:#e0f7fa;font-family:'Sora','Segoe UI',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.2);border-radius:4px;}
.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,188,212,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,229,255,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;}
header{padding:14px 16px 10px;border-bottom:1px solid rgba(0,229,255,0.12);background:rgba(8,12,16,0.97);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo-title{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#00e5ff,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:0.6rem;color:rgba(0,229,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.made-by{font-size:0.65rem;color:rgba(0,229,255,0.7);background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);border-radius:20px;padding:4px 10px;}
.clear-btn{background:none;border:none;color:rgba(0,229,255,0.4);cursor:pointer;font-size:0.7rem;padding:4px 8px;font-family:inherit;}
.modes-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:rgba(8,12,16,0.9);border-bottom:1px solid rgba(0,229,255,0.08);scrollbar-width:none;flex-shrink:0;}
.modes-bar::-webkit-scrollbar{display:none;}
.mode-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(224,247,250,0.5);font-size:0.75rem;cursor:pointer;white-space:nowrap;font-family:inherit;}
.mode-btn.active{border-color:rgba(0,229,255,0.6);background:rgba(0,229,255,0.12);color:#00e5ff;font-weight:700;}
#chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;}
.welcome{display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:14px;animation:fadeIn 0.5s ease;}
.welcome-icon{font-size:2.8rem;filter:drop-shadow(0 0 20px rgba(0,229,255,0.4));}
.welcome-title{font-size:1.3rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#00e5ff,#4dd0e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3;}
.welcome-desc{font-size:0.78rem;color:rgba(224,247,250,0.5);text-align:center;line-height:1.6;max-width:300px;}
.mode-label{font-size:0.72rem;color:rgba(0,229,255,0.5);}
.mode-label span{color:#00e5ff;font-weight:700;}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:380px;}
.quick-btn{padding:9px 10px;border-radius:10px;border:1px solid rgba(0,229,255,0.15);background:rgba(0,229,255,0.05);color:rgba(224,247,250,0.7);font-size:0.7rem;cursor:pointer;text-align:left;line-height:1.4;font-family:inherit;}
.quick-btn:active{background:rgba(0,229,255,0.15);}
.msg-wrap{animation:fadeIn 0.3s ease;}
.user-side{display:flex;flex-direction:column;align-items:flex-end;}
.mode-badge{font-size:0.58rem;opacity:0.6;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;}
.user-bubble{background:linear-gradient(135deg,#00bcd4,#00838f);color:#fff;padding:10px 14px;border-radius:16px 16px 4px 16px;max-width:82%;font-size:0.85rem;line-height:1.5;word-break:break-word;}
.bot-bubble{background:rgba(255,255,255,0.04);border:1px solid rgba(0,229,255,0.12);padding:12px 14px;border-radius:4px 16px 16px 16px;max-width:94%;font-size:0.85rem;line-height:1.7;word-break:break-word;}
.bot-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:0.65rem;color:#00e5ff;font-weight:700;letter-spacing:1px;}
.typing{display:flex;align-items:center;gap:4px;padding:4px 0;}
.dot{width:6px;height:6px;border-radius:50%;background:#00e5ff;display:inline-block;}
.dot:nth-child(1){animation:blink 1.2s infinite 0s;}
.dot:nth-child(2){animation:blink 1.2s infinite 0.2s;}
.dot:nth-child(3){animation:blink 1.2s infinite 0.4s;}
.typing-text{font-size:0.7rem;color:rgba(0,229,255,0.5);margin-left:6px;}
.input-area{padding:10px 14px;border-top:1px solid rgba(0,229,255,0.1);background:rgba(8,12,16,0.97);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
textarea{flex:1;background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.2);border-radius:12px;color:#e0f7fa;padding:10px 13px;font-size:0.85rem;resize:none;outline:none;font-family:inherit;line-height:1.5;max-height:110px;overflow-y:auto;}
textarea::placeholder{color:rgba(0,229,255,0.3);}
.send-btn{width:42px;height:42px;border-radius:12px;border:none;background:rgba(0,229,255,0.1);color:rgba(0,229,255,0.4);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn.active{background:linear-gradient(135deg,#00e5ff,#00bcd4);color:#080c10;}
.bot-content h1{color:#4dd0e1;margin:14px 0 8px;font-size:1.05rem;}
.bot-content h2{color:#00bcd4;margin:12px 0 6px;font-size:0.95rem;}
.bot-content h3{color:#00e5ff;margin:10px 0 5px;font-size:0.88rem;}
.bot-content strong{color:#b2ebf2;font-weight:700;}
.bot-content .bullet{display:flex;gap:7px;margin:3px 0;}
.bot-content .bullet-arrow{color:#00e5ff;flex-shrink:0;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<header>
  <div>
    <div class="logo-title">💊 PharmaBot</div>
    <div class="logo-sub">D.Pharma AI Assistant</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearChat()">🗑️ Clear</button>
    <div class="made-by">✨ Made by Ayush Ji</div>
  </div>
</header>
<div class="modes-bar">
  <button class="mode-btn active" onclick="setMode('notes',this)">📝 AI Notes</button>
  <button class="mode-btn" onclick="setMode('mcq',this)">🎯 MCQ Practice</button>
  <button class="mode-btn" onclick="setMode('board',this)">📋 Board Paper</button>
  <button class="mode-btn" onclick="setMode('sample',this)">📄 Sample Paper</button>
  <button class="mode-btn" onclick="setMode('search',this)">🔍 Search</button>
</div>
<div id="chat"></div>
<div class="input-area">
  <textarea id="userInput" rows="1" placeholder="📝 Topic ke detailed notes..." onkeydown="handleKey(event)" oninput="autoResize(this);toggleSend()"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>
<script>
const API_KEY = "AIzaSyCuI4R2voVKdV__kQ5Zon3jnp9IxyoDBuc";
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY;

const SYSTEM = `Tu PharmaBot hai — ek expert AI study assistant jo sirf D.Pharma 1st aur 2nd year ke students ke liye kaam karta hai India mein. Hamesha Hinglish mein jawab de.

Subjects cover karta hai:
1st Year: Pharmaceutics-I, Pharmaceutical Chemistry-I, Pharmacognosy, Human Anatomy & Physiology, Health Education & Community Pharmacy, Biochemistry & Clinical Pathology
2nd Year: Pharmaceutics-II, Pharmaceutical Chemistry-II, Pharmacology & Toxicology, Pharmaceutical Jurisprudence, Drug Store & Business Management, Hospital & Clinical Pharmacy

NOTES mode: detailed exam-ready notes banao with ## headings, **bold** key terms, - bullet points, aur mnemonics.
MCQ mode: 5+ questions with A/B/C/D options, sahi answer ke aage checkmark, brief explanation.
BOARD mode: UP State Pharmacy Council style important questions, marking scheme, tips.
SAMPLE mode: complete sample paper with header, Section A short questions, Section B long questions with marks.
SEARCH mode: koi bhi drug, disease, chemical ka full info do — definition, uses, side effects, mechanism, contraindications, exam important points.

Sirf D.Pharma topics answer karo. Friendly aur encouraging raho. Year/subject hamesha batao.`;

const QUICK = {
  notes: ["Pharmacology ke basic concepts","Vitamin B complex notes","Drug interactions explain karo","Pharmaceutical calculations"],
  mcq: ["Pharmacognosy ke 10 MCQ do","Anatomy ke 5 MCQ banao","Pharmaceutics MCQ practice","Drug store MCQ"],
  board: ["2nd year board pattern batao","Important Qs Pharmacology","Previous year Chemistry Qs","Short notes topics"],
  sample: ["2nd year complete sample paper","1st year 3 hour paper banao","Pharmacology unit test","Community Pharmacy test"],
  search: ["Paracetamol ke baare mein batao","Aspirin kya hai aur uses","Morphine uses & side effects","Penicillin mechanism of action"]
};

const PLACEHOLDERS = {
  notes: "📝 Topic ke detailed notes...",
  mcq: "🎯 Kaunse subject ke MCQ chahiye...",
  board: "📋 Board exam help ke liye poochho...",
  sample: "📄 Kaunsa sample paper banana hai...",
  search: "🔍 Koi bhi drug ya topic search karo..."
};

const LABELS = {notes:"📝 AI Notes", mcq:"🎯 MCQ", board:"📋 Board", sample:"📄 Sample", search:"🔍 Search"};
let mode = "notes", history = [], loading = false;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('userInput').placeholder = PLACEHOLDERS[m];
  if(history.length === 0) renderWelcome();
}

function getModePrompt(text) {
  const p = {
    notes: "Notes mode: Topic: \"" + text + "\". Exam-ready detailed notes banao with ## headings, **bold** terms, - bullets, mnemonics. Year/subject bhi batao.",
    mcq: "MCQ mode: \"" + text + "\" — 5+ MCQ with A/B/C/D, correct answer ke aage checkmark, brief explanation.",
    board: "Board Help: \"" + text + "\" — UP Pharmacy Council style important questions, marks distribution, exam tips.",
    sample: "Sample Paper: \"" + text + "\" — Complete paper with header (subject/time/marks), Section A short Qs, Section B long Qs.",
    search: "Search mode: \"" + text + "\" ke baare mein comprehensive info do — definition, classification, uses, side effects, mechanism of action, contraindications, aur D.Pharma exam ke liye important points."
  };
  return p[mode];
}

function formatContent(text) {
  let html = text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.*?)$/gm,'<h3>$1</h3>')
    .replace(/^## (.*?)$/gm,'<h2>$1</h2>')
    .replace(/^# (.*?)$/gm,'<h1>$1</h1>')
    .replace(/^- (.*?)$/gm,'<div class="bullet"><span class="bullet-arrow">&#9658;</span><span>$1</span></div>')
    .replace(/\n/g,'<br/>');
  return '<div class="bot-content">' + html + '</div>';
}

function renderWelcome() {
  document.getElementById('chat').innerHTML =
    '<div class="welcome">' +
    '<div class="welcome-icon">💊</div>' +
    '<div class="welcome-title">D.Pharma Ka Sapna,<br/>Ab Aasaan Hai!</div>' +
    '<div class="welcome-desc">Notes, MCQs, Board Papers, Sample Papers aur Drug Search — sab ek jagah! 🎓</div>' +
    '<div class="mode-label">Mode: <span>' + LABELS[mode] + '</span> — Quick start:</div>' +
    '<div class="quick-grid">' + QUICK[mode].map(function(q){ return '<button class="quick-btn" onclick="sendMessage(\'' + q + '\')">' + q + '</button>'; }).join('') + '</div>' +
    '</div>';
}

async function sendMessage(text) {
  if(loading) return;
  const inp = document.getElementById('userInput');
  const msg = text || inp.value.trim();
  if(!msg) return;

  document.getElementById('clearBtn').style.display = 'block';
  const chat = document.getElementById('chat');
  const w = chat.querySelector('.welcome');
  if(w) w.remove();

  const udiv = document.createElement('div');
  udiv.className = 'msg-wrap';
  udiv.innerHTML = '<div class="user-side"><div class="mode-badge">' + LABELS[mode] + '</div><div class="user-bubble">' + msg + '</div></div>';
  chat.appendChild(udiv);

  if(!text) { inp.value = ''; autoResize(inp); }
  toggleSend();

  const tdiv = document.createElement('div');
  tdiv.className = 'msg-wrap'; tdiv.id = 'typing';
  tdiv.innerHTML = '<div class="bot-bubble"><div class="bot-header"><span>💊</span><span>PHARMABOT</span></div><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="typing-text">Likh raha hoon...</span></div></div>';
  chat.appendChild(tdiv);
  chat.scrollTop = chat.scrollHeight;
  loading = true;

  history.push({role:"user", parts:[{text: getModePrompt(msg)}]});

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        system_instruction: {parts:[{text: SYSTEM}]},
        contents: history,
        generationConfig: {maxOutputTokens: 1500, temperature: 0.7}
      })
    });
    const data = await res.json();
    const reply = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) ? data.candidates[0].content.parts[0].text : "Kuch error aa gaya, dobara try karo!";
    history.push({role:"model", parts:[{text: reply}]});

    const typing = document.getElementById('typing');
    if(typing) typing.remove();

    const bdiv = document.createElement('div');
    bdiv.className = 'msg-wrap';
    bdiv.innerHTML = '<div class="bot-bubble"><div class="bot-header"><span>💊</span><span>PHARMABOT</span></div>' + formatContent(reply) + '</div>';
    chat.appendChild(bdiv);
  } catch(e) {
    const typing = document.getElementById('typing');
    if(typing) typing.remove();
    const ediv = document.createElement('div');
    ediv.className = 'msg-wrap';
    ediv.innerHTML = '<div class="bot-bubble"><div class="bot-header"><span>💊</span><span>PHARMABOT</span></div><div>Network error! Internet check karo aur dobara try karo.</div></div>';
    chat.appendChild(ediv);
  }

  loading = false;
  chat.scrollTop = chat.scrollHeight;
}

function clearChat() { history=[]; document.getElementById('clearBtn').style.display='none'; renderWelcome(); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function toggleSend() { var v=document.getElementById('userInput').value.trim(); document.getElementById('sendBtn').classList.toggle('active',!!v&&!loading); }

renderWelcome();
</script>
</body>
</html>
